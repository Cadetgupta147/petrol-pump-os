<svg viewBox="0 0 380 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="380" height="760" rx="24" fill="#F7F5F0" stroke="#14213D" stroke-width="4"/>
  <rect x="0" y="0" width="380" height="70" rx="24" fill="#14213D"/>
  <rect x="0" y="46" width="380" height="24" fill="#14213D"/>
  <text x="190" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">New Bill — Nozzle 2</text>

  <!-- QR scan primary action -->
  <rect x="24" y="90" width="332" height="150" rx="14" fill="#14213D"/>
  <rect x="140" y="115" width="100" height="100" rx="8" fill="none" stroke="#FB8B24" stroke-width="3" stroke-dasharray="10,6"/>
  <text x="190" y="170" text-anchor="middle" font-size="26" fill="#FB8B24">▦</text>
  <text x="190" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Tap to scan customer QR card</text>

  <text x="190" y="264" text-anchor="middle" font-size="11" fill="#9AA5BD">— or enter manually —</text>

  <!-- manual fields -->
  <rect x="24" y="280" width="332" height="44" rx="8" fill="#FFFFFF" stroke="#D8D3C4"/>
  <text x="36" y="306" font-size="12" fill="#6B7280">Vehicle number (optional*)</text>
  <rect x="24" y="332" width="332" height="44" rx="8" fill="#FFFFFF" stroke="#D8D3C4"/>
  <text x="36" y="358" font-size="12" fill="#6B7280">Customer name (optional*)</text>
  <text x="36" y="390" font-size="10" fill="#E63946">*At least one of the two is required</text>

  <rect x="24" y="404" width="160" height="44" rx="8" fill="#FFFFFF" stroke="#D8D3C4"/>
  <text x="36" y="430" font-size="12" fill="#6B7280">Litres: 22.5</text>
  <rect x="196" y="404" width="160" height="44" rx="8" fill="#FFFFFF" stroke="#D8D3C4"/>
  <text x="208" y="430" font-size="12" fill="#6B7280">Amount: ₹2,250</text>

  <text x="36" y="474" font-size="12" font-weight="700" fill="#14213D">Payment type</text>
  <rect x="24" y="484" width="76" height="36" rx="18" fill="#2A9D8F"/>
  <text x="62" y="507" text-anchor="middle" font-size="11" fill="#FFF">Cash</text>
  <rect x="108" y="484" width="76" height="36" rx="18" fill="#FFFFFF" stroke="#D8D3C4"/>
  <text x="146" y="507" text-anchor="middle" font-size="11" fill="#6B7280">Card</text>
  <rect x="192" y="484" width="76" height="36" rx="18" fill="#FFFFFF" stroke="#D8D3C4"/>
  <text x="230" y="507" text-anchor="middle" font-size="11" fill="#6B7280">UPI</text>
  <rect x="276" y="484" width="80" height="36" rx="18" fill="#FFFFFF" stroke="#D8D3C4"/>
  <text x="316" y="507" text-anchor="middle" font-size="11" fill="#6B7280">Credit</text>

  <!-- loyalty points banner -->
  <rect x="24" y="536" width="332" height="56" rx="10" fill="#FFF4E6"/>
  <text x="36" y="558" font-size="12" font-weight="700" fill="#B3562E">🎁 This bill earns: 22.5 points</text>
  <text x="36" y="576" font-size="10" fill="#B3562E">(litre-based · 1 pt/L · customer's active rate)</text>

  <!-- save button -->
  <rect x="24" y="608" width="332" height="52" rx="10" fill="#FB8B24"/>
  <text x="190" y="640" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">Save &amp; Print Receipt</text>

  <!-- offline note -->
  <rect x="24" y="674" width="332" height="34" rx="8" fill="#EAF7F5"/>
  <text x="190" y="696" text-anchor="middle" font-size="10" fill="#1D6E63">🟢 Online — entry will sync instantly</text>

  <text x="190" y="736" text-anchor="middle" font-size="9" fill="#9AA5BD">Shift: 8:00 AM–2:00 PM · Amit Kumar · PIN login</text>
</svg>
