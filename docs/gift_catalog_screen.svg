  <text x="120" y="290" font-size="10" fill="#6B7280">Stock: 14 left at this pump</text>
  <text x="120" y="308" font-size="12" font-weight="700" fill="#2A9D8F">300 pts</text>
  <rect x="264" y="288" width="76" height="30" rx="15" fill="#2A9D8F"/>
