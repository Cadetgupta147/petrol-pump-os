  <text x="40" y="484" font-size="12" font-weight="700" fill="#B3562E">Prefer cash discount instead?</text>
  <text x="40" y="502" font-size="10" fill="#B3562E">Your dealer allows both: gifts OR</text>
  <text x="40" y="518" font-size="10" fill="#B3562E">₹1 per point off your next bill.</text>
  <rect x="40" y="526" width="140" height="24" rx="12" fill="#FB8B24"/>
