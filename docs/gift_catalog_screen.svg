  <!-- gift card 3 - locked -->
  <rect x="24" y="344" width="332" height="96" rx="10" fill="#FFFFFF" stroke="#E3DECB" opacity="0.6"/>
  <rect x="36" y="356" width="72" height="72" rx="8" fill="#F0EEE6"/>
  <text x="72" y="400" text-anchor="middle" font-size="24">🎒</text>
