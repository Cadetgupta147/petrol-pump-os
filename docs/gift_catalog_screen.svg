<svg viewBox="0 0 380 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="380" height="760" rx="24" fill="#F7F5F0" stroke="#14213D" stroke-width="4"/>
