  <text x="120" y="202" font-size="12" font-weight="700" fill="#2A9D8F">500 pts</text>
  <rect x="264" y="182" width="76" height="30" rx="15" fill="#2A9D8F"/>
  <text x="302" y="202" text-anchor="middle" font-size="10" fill="#FFF">Redeem</text>

  <!-- gift card 2 -->
  <rect x="24" y="238" width="332" height="96" rx="10" fill="#FFFFFF" stroke="#E3DECB"/>
