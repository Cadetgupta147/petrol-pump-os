name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: petrol_pump_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/petrol_pump_os?schema=public"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/petrol_pump_os?schema=public"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Run migrations against test DB
        run: npx prisma migrate deploy

      # Uncomment once each app has tests/lint configured:
      # - name: Lint
      #   run: npm run lint --workspaces --if-present
      # - name: Test
      #   run: npm run test --workspaces --if-present
